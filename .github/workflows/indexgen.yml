name: Deploy HTML Vault
on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Table of Contents
        run: |
          echo "<html><head><title>My Notes</title><style>body{font-family:sans-serif; padding:40px; line-height:1.6;} li{margin:10px 0;}</style></head><body>" > index.html
          echo "<h1>School Notes: Table of Contents</h1><ul>" >> index.html
          # This finds all .html files (except index.html) and creates links
          find . -name "*.html" ! -name "index.html" | sed 's|^\./||' | while read line; do
            echo "<li><a href=\"$line\">${line%.html}</a></li>" >> index.html
          done
          echo "</ul></body></html>" >> index.html

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
